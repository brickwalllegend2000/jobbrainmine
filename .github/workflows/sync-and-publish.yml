name: Sync tracking and publish Pages

on:
  push:
    branches: [main]
    paths:
      - "brainjob/data/**"
      - "brainjob/src/brainjob/**"
      - "brainjob/pyproject.toml"
      - ".github/workflows/sync-and-publish.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install brainjob
        run: python -m pip install -e "./brainjob"

      - name: Validate and sync
        run: |
          brainjob validate --root brainjob
          brainjob sync --root brainjob

      - name: Commit tracking artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add brainjob/tracking/index.json brainjob/tracking/dashboard.html
          if git diff --staged --quiet; then
            echo "Tracking artifacts already up to date."
          else
            git commit -m "chore(tracking): regenerate dashboard [skip ci]"
            git push
          fi

      - name: Prepare Pages site
        run: |
          mkdir -p site
          cp brainjob/tracking/dashboard.html site/index.html

      - name: Validate Pages artifact
        run: |
          test -s site/index.html
          grep -Fq '<title>Brainjob Dashboard</title>' site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: sync
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
