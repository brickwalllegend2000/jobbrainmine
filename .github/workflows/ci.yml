name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brainjob
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install brainjob
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Run tests
        run: python -m pytest

      - name: Validate workspace
        run: brainjob validate

      - name: Check tracking is up to date
        run: brainjob sync --check
