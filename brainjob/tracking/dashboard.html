<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brainjob Dashboard</title>
  <style>
:root {
  --bg: #0f1419;
  --panel: #1a2332;
  --text: #e7ecf3;
  --muted: #9aa7b8;
  --accent: #5b9fd4;
  --good: #3ecf8e;
  --warn: #f0b429;
  --bad: #ef6461;
  --border: #2a3648;
  --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  --sans: "Segoe UI", system-ui, sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

.wrap {
  width: min(1100px, calc(100% - 2rem));
  margin: 0 auto;
}

.site-header, .site-footer {
  padding: 1.25rem 0;
}

.site-header {
  border-bottom: 1px solid var(--border);
  background: rgba(26, 35, 50, 0.6);
}

.site-header h1 {
  margin: 0;
  font-size: 1.6rem;
}

.subtitle {
  margin: 0.25rem 0 0;
  color: var(--muted);
}

.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  margin: 1rem 0;
}

.hidden { display: none; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.75rem;
}

.stat-card {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem;
}

.stat-card .value {
  font-size: 1.4rem;
  font-weight: 700;
}

.stat-card .label {
  color: var(--muted);
  font-size: 0.85rem;
}

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem 1rem;
  align-items: end;
}

.filters label {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
  font-size: 0.85rem;
  color: var(--muted);
}

.filters select,
.filters input[type="search"] {
  min-width: 180px;
  padding: 0.45rem 0.6rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
}

.filters .checkbox {
  flex-direction: row;
  align-items: center;
  gap: 0.4rem;
  padding-top: 1.2rem;
}

.job-list {
  display: grid;
  gap: 0.75rem;
}

.job-card {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.85rem 1rem;
  background: rgba(255, 255, 255, 0.02);
  cursor: pointer;
}

.job-card:hover {
  border-color: var(--accent);
}

.job-card h3 {
  margin: 0 0 0.25rem;
  font-size: 1.05rem;
}

.job-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  color: var(--muted);
  font-size: 0.85rem;
}

.badge {
  display: inline-block;
  padding: 0.1rem 0.45rem;
  border-radius: 999px;
  font-size: 0.75rem;
  border: 1px solid var(--border);
}

.badge.status { border-color: var(--accent); color: var(--accent); }
.badge.priority-high { border-color: var(--bad); color: var(--bad); }
.badge.priority-medium { border-color: var(--warn); color: var(--warn); }
.badge.priority-low { border-color: var(--good); color: var(--good); }
.badge.overdue { border-color: var(--bad); color: var(--bad); }
.badge.integrity-bad { border-color: var(--bad); color: var(--bad); }
.badge.integrity-ok { border-color: var(--good); color: var(--good); }

.btn-secondary {
  margin-bottom: 0.75rem;
  padding: 0.4rem 0.75rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

.detail-grid {
  display: grid;
  gap: 1rem;
}

.detail-section h4 {
  margin: 0 0 0.5rem;
  color: var(--accent);
}

.detail-section ul {
  margin: 0;
  padding-left: 1.1rem;
}

.description-box {
  white-space: pre-wrap;
  font-family: var(--mono);
  font-size: 0.85rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem;
  max-height: 320px;
  overflow: auto;
}

.integrity {
  font-family: var(--mono);
  font-size: 0.8rem;
}

.integrity.ok { color: var(--good); }
.integrity.bad { color: var(--bad); }

code {
  font-family: var(--mono);
  font-size: 0.85em;
}

@media (max-width: 640px) {
  .filters select,
  .filters input[type="search"] {
    min-width: 100%;
  }
}

  </style>
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <h1>Brainjob</h1>
      <p class="subtitle">JSON-only job search tracker</p>
    </div>
  </header>
  <main class="wrap">
    <section id="stats-panel" class="panel"></section>
    <section id="filters-panel" class="panel">
      <div class="filters">
        <label>
          Status
          <select id="filter-status">
            <option value="">All statuses</option>
          </select>
        </label>
        <label>
          Priority
          <select id="filter-priority">
            <option value="">All priorities</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </label>
        <label class="checkbox">
          <input type="checkbox" id="filter-overdue"> Overdue actions only
        </label>
        <label class="checkbox">
          <input type="checkbox" id="filter-integrity"> Integrity issues only
        </label>
        <input type="search" id="filter-search" placeholder="Search title, company, tags">
      </div>
    </section>
    <section id="jobs-panel" class="panel"></section>
    <section id="detail-panel" class="panel hidden">
      <button type="button" id="detail-close" class="btn-secondary">Close detail</button>
      <div id="detail-content"></div>
    </section>
  </main>
  <footer class="site-footer wrap">
    <p>Generated at <span id="generated-at"></span>. Authoritative data lives under <code>data/jobs/</code>.</p>
  </footer>

 "pending_count": 1}, "data_path": "../data/jobs/example-company-policy-officer"}, {"id": "giz-junior-advisor-for-the-global-gateway-investment-climate-reform-facility", "role": {"title": "Junior Advisor for the Global Gateway Investment Climate Reform Facility", "company": "GIZ", "department": null, "employment_type": "fixed-term", "seniority": "junior", "vacancies": 1}, "location": {"display": "Brussels, Belgium", "city": "Brussels", "country": "Belgium", "work_arrangement": "hybrid", "remote_restrictions": null, "relocation_available": null}, "compensation": {"minimum": null, "maximum": null, "currency": "EUR", "interval": "yearly", "display_original": "Remunerated according to experience (GIZ Brussels PC200)", "benefits_original": null}, "dates": {"published": null, "deadline": null, "start_date": null, "captured": "2026-07-21T01:41:42+02:00", "last_verified": "2026-07-21T01:41:42+02:00"}, "source": {"url": "https://jobs.euractiv.com/jobs/junior-advisor-m-f-d-for-the-global-gateway-investment-climate-reform-gg-icr-facility/", "domain": "jobs.euractiv.com", "reference": "Euractiv Jobs posting", "capture_method": "manual", "posting_status": "open"}, "classification": {"tags": ["economics", "development", "global-gateway", "investment-climate"], "priority": "medium"}, "description_original": {"format": "plain_text", "content": "Junior Advisor (m/f/d) for the Global Gateway Investment Climate Reform (GG ICR) Facility\n\nOrganisation: GIZ (implemented with Expertise France and SNV; posted via Euractiv Jobs)\nLocation: Brussels, Belgium\nEngagement: Temporary contract (PC200 Belgian law)\nWork arrangement: Hybrid\nSource: https://jobs.euractiv.com/jobs/junior-advisor-m-f-d-for-the-global-gateway-investment-climate-reform-gg-icr-facility/\n\n## About the programme\n\nThe Global Gateway Investment Climate Reform (ICR) Facility supports partner governments, public institutions and private-sector representatives in improving the business environment and investment climate in line with the EU’s Global Gateway strategy. Jointly co-funded by the European Union, the German Federal Ministry for Economic Cooperation and Development (BMZ), and the French Ministry for Europe and Foreign Affairs (MEAE), the Facility is implemented by GIZ, Expertise France and SNV.\n\nThe Facility provides high-quality technical assistance, develops and disseminates knowledge products, strengthens strategic dialogue with EU institutions and contributes to evidence-based policy processes. A central component is the ICR Knowledge Hub, which consolidates lessons learned, maintains methodological standards, and ensures cross-regional learning aligned with Global Gateway priorities.\n\n## Tasks\n\nReinforcing the Brussels-based team, the Junior Advisor for the GG ICR Facility works closely with all team members, most particularly with GIZ staff but also with partner organisations across INTPA partner countries to:\n\n- Support the implementation of the outreach strategies for the GG ICR Facility\n- Support the management of technical assistance interventions in support of GG ICR partner organisations (governments, public agencies, chambers, associations etc), with a focus on business environment reform, including for each intervention:\n  - Assessing the request for support from partner organisations, through interviews with requesters and other relevant actors\n  - Draft Terms of Reference for the proposed intervention\n  - Select and manage consultants to implement the intervention\n  - Organise and hold regular exchanges with the requesters and consultants to ensure sound implementation\n  - Liaise with the EU Delegations and other donors in the respective countries\n  - Ensure collection of required data for monitoring and evaluating impact\n  - Ensure adherence to communication and visibility rules by all actors, in particular consultants\n- Contribute to GG ICR Facility knowledge management through studies, training, peer-events, especially in business environment reforms and women's economic empowerment\n- Support Monitoring and Evaluation (M&E) efforts, including baseline/endline data and donor reporting (EU and BMZ)\n\n## Requirements\n\n- Master’s degree or equivalent in economics, political science, public policy, international development, business administration, law, or another relevant field\n- First relevant professional experience in international development cooperation, preferably private sector development, investment climate reform, business environment reform, public-private dialogue, women’s economic empowerment, trade, or economic governance\n- First professional experience working with stakeholders of developing countries; first experience managing technical assistance interventions\n- Strong conceptual and analytical skills\n- Understanding of EU development cooperation, Global Gateway, EU Delegations, and Team Europe\n- Excellent English; French and/or Spanish strong assets; Portuguese an advantage\n- High intercultural competence, political sensitivity, flexibility\n- Willingness to travel to INTPA partner countries and within Europe\n\n## Offer\n\nTemporary contract with GIZ in Brussels under Belgian law (PC200). Remunerated according to experience. Legal holidays plus 5 extra days, lunch checks, hospitalisation insurance, public transport ticket reimbursement, home office per policy.\n\nOnly applications for candidates eligible to work in Belgium will be accepted. Apply via the Euractiv Jobs posting Apply button.\n", "language": "en", "captured_at": "2026-07-21T01:41:42+02:00", "sha256": "8c832ba33cc6da62a11b7f7ec9b077f99070ecf719df422f1acdcd7ae3759d8a"}, "integrity": {"valid": true, "sha256": "8c832ba33cc6da62a11b7f7ec9b077f99070ecf719df422f1acdcd7ae3759d8a", "error": null}, "application": {"status": "saved", "saved_date": "2026-07-21", "applied_date": null, "next_action": {"description": "Review GG ICR fit and decide whether to apply via Euractiv", "due": "2026-07-27", "completed": false}, "ov sted\nDeadline: July 14, 2026 9:00 AM (GMT+2)\nEngagement: Consultancy\nLast reviewed: July 10, 2026\nLevel: Consultant\nLocation: Brussels, Belgium\nOrganisation: Green European Foundation (GEF)\nSource documents: Call-for-policy-consultant-on-green-transition.pdf\nStart date: August 1, 2026\nThemes: Climate, Energy, Policy\nWork arrangement: Hybrid\n\n## Purpose\n\nGEF seeks a research and policy adviser focused on EU energy policy, eco-social policy, rights-based approaches, and wellbeing. The provider will produce research, analysis, recommendations, publications, events, and stakeholder engagement while supporting GEF as a hub for green policy expertise.\n\n## Tasks and deliverables\n\n- Conduct qualitative and quantitative policy research on the green transition.\n- Liaise with NGOs, think tanks, policymakers, and institutional actors.\n- Coordinate a Knowledge Community on participation in the EU energy transition.\n- Moderate, take notes, and report on expert roundtables.\n- Coordinate external experts and draft or review political briefs.\n- Support additional work on EU social policy, the economy, sustainable welfare, and wellbeing.\n- Support events, meetings, conferences, representation, and network building.\n- Deliver content and financial reporting.\n\n## Contract\n\n- Service-provider arrangement averaging 1.5 days per week in the Brussels office, with telework possible.\n- Initial mission from August 2026 to August 2027.\n- Renewable up to five years based on quality and performance.\n- Maximum estimated annual value: €35,000 excluding VAT.\n- Proposal should state a daily fee, VAT rate, and any minimum billable amount.\n\n## Selection criteria\n\n- High-quality qualitative and quantitative policy research.\n- Strong expertise and networks in EU energy policy, eco-social policy, rights-based approaches, and wellbeing.\n- Science and technology policy background and experience connecting advocacy, policy, and technical analysis.\n- Knowledge of EU institutions, policymaking, political dynamics, and diverse green-transition contexts.\n- Research design, coordination, and leadership.\n- Excellent English policy writing, presentation, public speaking, and facilitation.\n- At least five years of relevant policy research or advisory experience.\n- Strong stakeholder engagement, organisation, and time management.\n- Availability for in-person work in Brussels.\n\n## Award methodology\n\nBest price-quality ratio:\n\n- EU energy and related policy expertise: 30%.\n- Project coordination and research leadership: 20%.\n- Communication, writing, and dissemination: 20%.\n- Financial offer: 30%.\n\nFormula: [(lowest price / tenderer's price) × 30] + [(quality score / 100) × 70].\n\n## Application package\n\n- Introduction covering background, interest, competence, and fit.\n- Competitive daily fee in euros excluding VAT, with VAT rate.\n- CV and relevant writing, research, and policy samples.\n- Exclusion-criteria and conflict-of-interest declaration, or ESPD.\n- Submit through the official application form.\n\nQuestions: jamie.kendrick@gef.eu\n\nContracting party: Green European Foundation, Avenue des Arts 7-8, 1210 Brussels.\n\n## Source\n\nCall-for-policy-consultant-on-green-transition.pdf", "language": "en", "captured_at": "2026-07-21T00:28:01+02:00", "sha256": "7351b8a041608763c454f151fcd2176ac3497199449c72aa4c3f315d1db3c6c0"}, "integrity": {"valid": true, "sha256": "7351b8a041608763c454f151fcd2176ac3497199449c72aa4c3f315d1db3c6c0", "error": null}, "application": {"status": "saved", "saved_date": "2026-07-21", "applied_date": null, "next_action": {"description": "Deadline passed (2026-07-14); archive or note outcome", "due": "2026-07-20", "completed": false}, "overdue_action": false, "timeline": [{"timestamp": "2026-07-21T00:28:01+02:00", "type": "saved", "description": "Vacancy added to Brainjob"}], "interviews": [], "assessments": [], "offer": null, "outcome": null}, "contacts": [{"name": "Jamie Kendrick", "role": "Q priority": "medium"}, "description_original": {"format": "plain_text", "content": "Team Assistant\n\nOrganisation: ICMPD\nLocation: Brussels, Belgium\nEngagement: Fixed-term\nCompensation: Monthly net-base salary: €2,662.00\nDeadline: 27 July 2026\nWork arrangement: On-site\nSource: https://careers.icmpd.org/Home/JobOpeningDetails?jobOpeningId=1187\nSource documents: Generic Job Description Team Assistant (S1 LS1).pdf\n\n## Overview\n\nThis is a joint recruitment covering two Team Assistant positions across two ICMPD Global Initiatives: the European Union Migration and Displacement Capacity Assistance Project (EU-MIDCAP) and the Return and Reintegration Facility (RRF). Each Team Assistant will be assigned to one of the two initiatives.\n\n## Role\n\nThe Team Assistant is responsible for providing smooth, efficient, and reliable administrative support to managers and project staff for project-related activities. Reporting to the respective Project Manager, they work closely with project team members and provide guidance to new staff and personnel on ICMPD’s regulatory framework, standard administrative practices, and operating procedures.\n\n## Language requirements\n\n- Required: Proficiency in spoken and written English\n- Assets: Proficiency in French and Spanish\n\n## Project assignments\n\n### EU-MIDCAP\n\nThe European Union Migration and Displacement Capacity Assistance Project (EU-MIDCAP) is an EU-funded, DG INTPA-supported, consortium-led peer-to-peer facility. It supports partner-country authorities, civil society organisations, and regional bodies in strengthening migration and forced-displacement management systems and cooperation with the EU and its Member States.\n\nThe Team Assistant will provide cross-cutting support to the project and several Technical Assistance Actions, including in French- and Spanish-speaking countries, and will report to one of the Project Managers.\n\n### Return and Reintegration Facility (RRF)\n\nThe Return and Reintegration Facility (RRF) is an EU-funded programme supported by DG HOME. Established in 2022, it helps EU Member States strengthen the effectiveness, coordination, and sustainability of their return and reintegration systems. More information is available at https://www.reintegrationfacility.eu/.\n\nThe Team Assistant will join the RRF Facility Support and Knowledge Team, providing horizontal administrative support across the RRF’s four sub-teams, comprising around 25 team members in total, and will report to one of the Project Managers.\n\n## Generic profile (S1/LS1) summary\n\nThe Team Assistant provides administrative support including correspondence, reports, databases, expert recruitment/procurement support, travel organisation, contract monitoring, and events/meetings logistics. Requires bachelor's degree or equivalent (or high-school plus two additional years), at least two years relevant experience, events experience, strong English; SAP an asset. Classified S1/LS1.\n", "language": "en", "captured_at": "2026-07-21T01:41:42+02:00", "sha256": "16c990ce87bad5f069b1d9e3dd63235ea3792592f1a0cf1942b3e1c908fee283"}, "integrity": {"valid": true, "sha256": "16c990ce87bad5f069b1d9e3dd63235ea3792592f1a0cf1942b3e1c908fee283", "error": null}, "application": {"status": "saved", "saved_date": "2026-07-21", "applied_date": null, "next_action": {"description": "Decide EU-MIDCAP vs RRF assignment fit; confirm admin/coordination experience before drafting application", "due": "2026-07-20", "completed": false}, "overdue_action": false, "timeline": [{"timestamp": "2026-07-21T01:41:42+02:00", "type": "saved", "description": "Vacancy added to Brainjob"}], "interviews": [], "assessments": [], "offer": null, "outcome": null}, "contacts": [], "notes": [{"id": "note-1", "author": "ai", "category": "strategy", "content": "Joint recruitment for EU-MIDCAP and RRF Team Assistant roles. Generic S1/LS1 profile PDF attached as source document (not a separate vacancy).", "created_at": "2026-07-21T01:41:42 urpose\n\nLead Plan International's global Climate & Economic Empowerment agenda, advancing climate justice and resilient livelihoods for girls, young people, and marginalised communities. The role connects climate change, gender equality, youth economic empowerment, evidence, advocacy, programming, and resource mobilisation.\n\n## Responsibilities\n\n- Set the global vision, ambition, standards, and value proposition.\n- Build a strategic narrative grounded in climate resilience, community livelihoods, youth economic empowerment, and intersectional gender-transformative approaches.\n- Strengthen donor positioning, partnerships, resource mobilisation, and climate-finance opportunities.\n- Provide technical and thought leadership in climate and livelihoods.\n- Represent Plan International externally and influence sector dialogue.\n- Connect climate resilience with livelihoods, education, protection, and youth opportunity.\n- Translate research and field learning into advocacy, programme design, strategy, and funding narratives.\n- Align global, regional, and country teams and promote learning and innovation.\n\n## Candidate profile\n\n- Strong climate, resilience, and economic empowerment expertise.\n- Experience in resource-constrained, fragile, or climate-affected contexts.\n- Strong understanding of gender-transformative and youth-led approaches.\n- Experience with climate funding mechanisms, partnerships, or global donors.\n- Evidence-to-strategy, advocacy, and funding experience.\n- External representation, influencing, and partnership development.\n- Leadership through influence in a complex global matrix.\n- Excellent communication, facilitation, and strategic thinking.\n\n## Contract and eligibility\n\nPermanent full-time or maximum fixed-term contract under the employing office's terms. The applicant must already have the right to live and work in an eligible country where Plan International can employ for the Global Hub. The preferred location is an Asia-Pacific office; Belgium is among the eligible locations.\n\n## Role-specific application questions\n\n1. Describe experience engaging multilateral or global climate funding mechanisms such as the Green Climate Fund or Adaptation Fund (max 400 characters). Explain your role in securing or influencing access and how programming remained gender-transformative and community-driven.\n2. Give an example of translating complex climate and livelihoods evidence into a strategic narrative (max 400 characters). Identify the evidence, audience—from community practitioners to global donors—and outcome.\n\n## Safeguarding and inclusion\n\nPlan International operates equal-opportunity, safeguarding, pre-employment screening, and Inter-Agency Misconduct Disclosure processes. Reasonable adjustments: careers@plan-international.org.\n", "language": "en", "captured_at": "2026-07-21T01:41:42+02:00", "sha256": "39cba17b68ca4ac47522e6ead334e66af8925478c64d4384c5876e78d6f987ee"}, "integrity": {"valid": true, "sha256": "39cba17b68ca4ac47522e6ead334e66af8925478c64d4384c5876e78d6f987ee", "error": null}, "application": {"status": "preparing", "saved_date": "2026-07-21", "applied_date": null, "next_action": {"description": "Finalise tailored CV/cover letter, verify 400-character responses, complete portal fields and submit", "due": "2026-07-11", "completed": false}, "overdue_action": true, "timeline": [{"timestamp": "2026-07-21T01:41:42+02:00", "type": "saved", "description": "Vacancy added to Brainjob"}], "interviews": [], "assessments": [], "offer": null, "outcome": null}, "contacts": [{"name": "Plan International Careers", "role": "Reasonable adjustments / careers", "organisation": "Plan International", "email": "careers@plan-international.org", "phone": null, "linkedin": null, "relationship": "unknown", "notes": null}], "notes": [{"id": "note-1", "author": "ai", "category": "strategy", "content": "No direct posting URL in upload; used jobs.plan-international.org as organisation careers URL. D \nDeadline: 24 July 2026\nStart date: 28 September 2026\nWork arrangement: Hybrid\nSource: https://www.polisnetwork.eu/job/communications-intern/\nSource documents: POLIS is hiring a Communications Intern - POLIS Network.pdf\n\n## Overview\n\nSix-month communications internship supporting the visibility of POLIS and its network of European cities and regions working on sustainable urban mobility.\n\n## Responsibilities\n\n- Manage POLIS social profiles, social calendar, and analytics across LinkedIn, Bluesky, and Instagram.\n- Draft website and Members' Area content.\n- Support digital and print publications, including Cities in Motion.\n- Produce short videos and visual assets.\n- Support projects, working groups, and online and in-person events.\n- Take notes and prepare communications reporting.\n- Prepare and edit Annual POLIS Conference materials.\n- Help print, organise, and display venue signage and handle conference tasks.\n\n## Candidate profile\n\n- Completed degree, preferably in communications, journalism, transport, urban planning, or a related field.\n- Initial communications, journalism, or public-relations experience.\n- Online content and social-media writing skills.\n- Website content management; WordPress is an asset.\n- Social management experience; LinkedIn, Bluesky, and Instagram are assets.\n- Visual judgement and graphic-design skills; Canva is an asset.\n- Interest in urban mobility.\n- Excellent written and spoken English; additional European languages are assets.\n- Existing legal right to work in Belgium; visa sponsorship is unavailable.\n\n## Offer\n\nFull-time internship from 28 September 2026 for six months. Primarily office-based in Brussels with hybrid work available within Belgium and limited Christmas-period remote work.\n\n## Application\n\nEmail a motivation letter and CV to Karen Vancluysen at polis@polisnetwork.eu by 24 July 2026. Subject: Your name and surname - POLIS Comms Intern.\n\nShortlisted candidates will be notified in l, "deadline": "2026-07-24", "start_date": null, "captured": "2026-07-21T01:41:42+02:00", "last_verified": "2026-07-10T00:00:00+02:00"}, "source": {"url": "https://jobs.transportenvironment.org/o/communications-officer-1", "domain": "jobs.transportenvironment.org", "reference": "Transport & Environment - Communications Officer.pdf", "capture_method": "manual", "posting_status": "open"}, "classification": {"tags": ["climate", "communications", "energy", "mobility"], "priority": "medium"}, "description_original": {"format": "plain_text", "content": "Communications Officer\n\nOrganisation: Transport & Environment (T&E)\nLocation: Brussels (Ixelles), Belgium\nEngagement: Permanent\nCompensation: Competitive salary based on experience, extensive benefits\nDeadline: 24 July 2026\nWork arrangement: Hybrid\nSource: https://jobs.transportenvironment.org/o/communications-officer-1\nSource documents: Transport & Environment - Communications Officer.pdf\n\n## About the role\n\nA media and creative communications role for someone who can plan campaigns, build narratives from data and research, and identify opportunities to elevate policy communications on transport decarbonisation and the energy transition.\n\n## Responsibilities\n\n- Manage relationships with EU affairs media, newswires, and correspondents.\n- Pitch stories and interviews and draft press releases, op-eds, and other media materials.\n- Develop creative campaign, communications, outreach, and engagement ideas for decision-makers.\n- Collaborate with policy teams on research ideas, story angles, and media narratives.\n- Monitor media and policy discussions and act on emerging opportunities.\n- Manage agencies and organise events, briefings, and webinars with researchers, experts, NGOs, and other stakeholders.\n- Identify and deliver video and visual communications opportunities.\n\n## Ideal skills and experience\n\n- Strategic contribution to advocacy, campaigning, communications, and policy goals.\n- Relevant experience, ideally in transport, environmental, or energy communications.\n- Strong internal and external stakeholder relationships, including remote teams.\n- Project planning, implementation, campaigning tools, digital tools, video, advertising, and other creative assets.\n- Entrepreneurial judgement and willingness to test new approaches.\n\n## Practicalities\n\nPermanent, full-time and based in Brussels, with at least two office days per week. Occasional travel to major EU capitals. Flexible working, including some home working, is available.\n", "language": "en", "captured_at": "2026-07-21T01:41:42+02:00", "sha256": "807d2d694898573161cd58c46753751627ed63ec07fc014cea263da0d4d8f684"}, "integrity": {"valid": true, "sha256": "807d2d694898573161cd58c46753751627ed63ec07fc014cea263da0d4d8f684", "error": null}, "application": {"status": "saved", "saved_date": "2026-07-21", "applied_date": null, "next_action": {"description": "Review T&E Communications Officer fit and prepare application materials", "due": "2026-07-22", "completed": false}, "overdue_action": false, "timeline": [{"timestamp": "2026-07-21T01:41:42+02:00", "type": "saved", "description": "Vacancy added to Brainjob"}], "interviews": [], "assessments": [], "offer": null, "outcome": null}, "contacts": [], "notes": [], "documents": {"items": [{"type": "other", "path": "Transport & Environment - Communications Officer.pdf", "version": 1, "created_at": "2026-07-21T01:41:42+02:00", "submitted": false}], "submitted_count": 0, "pending_count": 1}, "data_path": "../data/jobs/transport-environment-communications-officer"}]}</script>
  <script>
(function () {
  const data = JSON.parse(document.getElementById("brainjob-data").textContent);
  const jobs = data.jobs || [];
  const statsPanel = document.getElementById("stats-panel");
  const jobsPanel = document.getElementById("jobs-panel");
  const detailPanel = document.getElementById("detail-panel");
  const detailContent = document.getElementById("detail-content");
  const generatedAt = document.getElementById("generated-at");

  const filterStatus = document.getElementById("filter-status");
  const filterPriority = document.getElementById("filter-priority");
  const filterOverdue = document.getElementById("filter-overdue");
  const filterIntegrity = document.getElementById("filter-integrity");
  const filterSearch = document.getElementById("filter-search");
  const detailClose = document.getElementById("detail-close");

  generatedAt.textContent = data.generated_at || "unknown";

  function uniqueStatuses() {
    const set = new Set(jobs.map((job) => job.application.status).filter(Boolean));
    return Array.from(set).sort();
  }

  function renderStats() {
    const stats = data.stats || {};
    const byStatus = stats.by_status || {};
    const statusCards = Object.entries(byStatus)
      .map(
        ([status, count]) =>
          `<div class="stat-card"><div class="value">${count}</div><div class="label">${status}</div></div>`
      )
      .join("");

    statsPanel.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div class="value">${stats.total_jobs || 0}</div><div class="label">Total jobs</div></div>
        <div class="stat-card"><div class="value">${stats.overdue_actions || 0}</div><div class="label">Overdue actions</div></div>
        <div class="stat-card"><div class="value">${stats.upcoming_deadlines || 0}</div><div class="label">Upcoming deadlines</div></div>
        ${statusCards}
      </div>`;
  }

  function populateStatusFilter() {
    uniqueStatuses().forEach((status) => {
      const option = document.createElement("option");
      option.value = status;
      option.textContent = status;
      filterStatus.appendChild(option);
    });
  }

  function matchesFilters(job) {
    const status = filterStatus.value;
    const priority = filterPriority.value;
    const overdueOnly = filterOverdue.checked;
    const integrityOnly = filterIntegrity.checked;
    const query = filterSearch.value.trim().toLowerCase();

    if (status && job.application.status !== status) return false;
    if (priority && job.classification.priority !== priority) return false;
    if (overdueOnly && !job.application.overdue_action) return false;
    if (integrityOnly && job.integrity.valid) return false;

    if (query) {
      const haystack = [
        job.role.title,
        job.role.company,
        job.location.display,
        (job.classification.tags || []).join(" "),
      ]
        .filter(Boolean)
        .join(" ")
        .toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    return true;
  }

  function renderJobCard(job) {
    const priority = job.classification.priority || "medium";
    const overdue = job.application.overdue_action;
    const integrityClass = job.integrity.valid ? "integrity-ok" : "integrity-bad";
    const integrityLabel = job.integrity.valid ? "integrity ok" : "integrity issue";
    const next = job.application.next_action;
    const nextText = next && !next.completed
      ? `Next: ${next.description}${next.due ? " (due " + next.due + ")" : ""}`
      : "No pending next action";

    return `
      <article class="job-card" data-job-id="${job.id}">
        <h3>${escapeHtml(job.role.title)} @ ${escapeHtml(job.role.company)}</h3>
        <div class="job-meta">
          <span class="badge status">${escapeHtml(job.application.status || "unknown")}</span>
          <span class="badge priority-${priority}">${priority} priority</span>
          ${overdue ? '<span class="badge overdue">overdue action</span>' : ""}
          <span class="badge ${integrityClass}">${integrityLabel}</span>
          <span>${escapeHtml(job.location.display || "")}</span>
          ${job.dates.deadline ? `<span>Deadline: ${escapeHtml(job.dates.deadline)}</span>` : ""}
        </div>
        <p>${escapeHtml(nextText)}</p>
      </article>`;
  }

  function renderJobs() {
    const filtered = jobs.filter(matchesFilters);
    if (!filtered.length) {
      jobsPanel.innerHTML = "<p>No jobs match the current filters.</p>";
      return;
    }
    jobsPanel.innerHTML = `<div class="job-list">${filtered.map(renderJobCard).join("")}</div>`;
    jobsPanel.querySelectorAll(".job-card").forEach((card) => {
      card.addEventListener("click", () => showDetail(card.dataset.jobId));
    });
  }

  function showDetail(jobId) {
    const job = jobs.find((entry) => entry.id === jobId);
    if (!job) return;

    const interviews = (job.application.interviews || [])
      .map((item) => `<li>${escapeHtml(JSON.stringify(item))}</li>`)
      .join("") || "<li>None recorded</li>";

    const assessments = (job.application.assessments || [])
      .map((item) => `<li>${escapeHtml(JSON.stringify(item))}</li>`)
      .join("") || "<li>None recorded</li>";

    const timeline = (job.application.timeline || [])
      .map(
        (event) =>
          `<li><strong>${escapeHtml(event.type)}</strong> — ${escapeHtml(event.timestamp || "")}: ${escapeHtml(event.description || "")}</li>`
      )
      .join("") || "<li>Empty timeline</li>";

    const contacts = (job.contacts || [])
      .map(
        (contact) =>
          `<li>${escapeHtml(contact.name)} (${escapeHtml(contact.role || "contact")}) — ${escapeHtml(contact.organisation || "")}</li>`
      )
      .join("") || "<li>No contacts</li>";

    const notes = (job.notes || [])
      .map(
        (note) =>
          `<li><strong>${escapeHtml(note.author)}</strong> [${escapeHtml(note.category || "general")}]: ${escapeHtml(note.content)}</li>`
      )
      .join("") || "<li>No notes</li>";

    const documents = (job.documents.items || [])
      .map(
        (doc) =>
          `<li>${escapeHtml(doc.type)} v${doc.version} — ${escapeHtml(doc.path)} (${doc.submitted ? "submitted" : "pending"})</li>`
      )
      .join("") || "<li>No documents</li>";

    detailContent.innerHTML = `
      <div class="detail-grid">
        <section class="detail-section">
          <h4>${escapeHtml(job.role.title)} @ ${escapeHtml(job.role.company)}</h4>
          <p>Status: ${escapeHtml(job.application.status)} | Saved: ${escapeHtml(job.application.saved_date || "n/a")} | Applied: ${escapeHtml(job.application.applied_date || "n/a")}</p>
          <p>Location: ${escapeHtml(job.location.display || "n/a")} (${escapeHtml(job.location.work_arrangement || "unknown")})</p>
          <p>Compensation: ${formatCompensation(job.compensation)}</p>
          <p>Source: <a href="${escapeAttr(job.source.url)}" target="_blank" rel="noopener">${escapeHtml(job.source.url || "")}</a></p>
          <p>Captured: ${escapeHtml(job.dates.captured || "n/a")} | Verified: ${escapeHtml(job.dates.last_verified || "n/a")}</p>
        </section>
        <section class="detail-section">
          <h4>Original content integrity</h4>
          <p class="integrity ${job.integrity.valid ? "ok" : "bad"}">
            SHA-256: ${escapeHtml(job.integrity.sha256 || "n/a")}<br>
            ${job.integrity.valid ? "Content hash verified." : escapeHtml(job.integrity.error || "Integrity check failed.")}
          </p>
        </section>
        <section class="detail-section">
          <h4>Original job description</h4>
          <div class="description-box">${escapeHtml(job.description_original.content || "")}</div>
        </section>
        <section class="detail-section">
          <h4>Application timeline</h4>
          <ul>${timeline}</ul>
        </section>
        <section class="detail-section">
          <h4>Interviews & assessments</h4>
          <p><strong>Interviews</strong></p>
          <ul>${interviews}</ul>
          <p><strong>Assessments</strong></p>
          <ul>${assessments}</ul>
        </section>
        <section class="detail-section">
          <h4>Contacts</h4>
          <ul>${contacts}</ul>
        </section>
        <section class="detail-section">
          <h4>Notes</h4>
          <ul>${notes}</ul>
        </section>
        <section class="detail-section">
          <h4>Documents (${job.documents.submitted_count} submitted, ${job.documents.pending_count} pending)</h4>
          <ul>${documents}</ul>
        </section>
      </div>`;

    detailPanel.classList.remove("hidden");
    detailPanel.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function formatCompensation(comp) {
    if (!comp) return "n/a";
    if (comp.display_original) return comp.display_original;
    const min = comp.minimum;
    const max = comp.maximum;
    const currency = comp.currency || "";
    const interval = comp.interval || "";
    if (min == null && max == null) return "Not specified";
    if (min != null && max != null) return `${min}-${max} ${currency} ${interval}`.trim();
    return `${min ?? max} ${currency} ${interval}`.trim();
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");
  }

  function escapeAttr(value) {
    return escapeHtml(value).replaceAll("'", "&#39;");
  }

  [filterStatus, filterPriority, filterOverdue, filterIntegrity, filterSearch].forEach((el) => {
    el.addEventListener("input", renderJobs);
    el.addEventListener("change", renderJobs);
  });

  detailClose.addEventListener("click", () => detailPanel.classList.add("hidden"));

  renderStats();
  populateStatusFilter();
  renderJobs();
})();

  </script>
</body>
</html>
